# version: "3.8"

services:
  db:
    image: postgres:16
    container_name: postgres-db-new
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: mypassword
      POSTGRES_DB: job_board
    volumes:
      - pgdata:/var/lib/postgresql/data

  api:
    build: .
    container_name: jobboard-api
    ports:
      - "5000:5000"
    depends_on:
      - db
    environment:
         DATABASE_URL: postgresql://postgres:mypassword@db:5432/job_board


volumes:
  pgdata: